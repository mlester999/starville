packages:
  - apps/*
  - packages/*

linkWorkspacePackages: true
saveWorkspaceProtocol: rolling
strictPeerDependencies: true

peerDependencyRules:
  allowedVersions:
    utf-8-validate: '>=5.0.2 <7'

catalog:
  '@types/node': 22.20.1
  eslint: 9.39.4
  prettier: 3.9.5
  tsx: 4.23.0
  typescript: 5.9.3
  vitest: 4.1.10

minimumReleaseAgeExclude:
  - prettier@3.9.5
  - vite@8.1.4
  - '@fastify/cookie@11.1.1'
  - '@solana/spl-token@0.4.15'

allowBuilds:
  '@reown/appkit': true
  bigint-buffer: true
  esbuild: true
  sharp: true

ignoredBuiltDependencies:
  - bufferutil
  - utf-8-validate
